<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>날씨 정보</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            font-family: 'Arial', sans-serif;
        }
        .weather-container {
            text-align: center;
            background-image: url('path/to/your/background.jpg'); /* 배경 이미지 경로 */
            background-size: cover;
            background-position: center;
            color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .temperature {
            font-size: 4em;
            margin: 0;
        }
        .city {
            font-size: 2em;
            margin: 0;
        }
        .condition {
            font-size: 1.5em;
            margin: 0;
        }
        .high-low {
            font-size: 1em;
            margin: 10px 0;
        }
        .forecast-container {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .forecast-header, .forecast-hourly, .forecast-daily {
            margin: 10px 0;
        }
        .forecast-item {
            display: inline-block;
            width: 50px;
            text-align: center;
            color: white;
        }
        .forecast-hourly .forecast-item img, .forecast-daily .forecast-item img {
            width: 30px;
            height: 30px;
        }
    </style>
</head>
<body>
    <div class="weather-container">
        <div class="city">강릉시</div>
        <div class="temperature">15°</div>
        <div class="condition">흐림</div>
        <div class="high-low">최고: 18° 최저: 13°</div>
        <div class="forecast-container">
            <div class="forecast-header">
                07:00~09:00에 강우 상태가, 18:00에 부분적으로 흐린 상태가 예상됩니다.
            </div>
            <div class="forecast-hourly">
                <div class="forecast-item">
                    <div>지금</div>
                    <img src="weather-icon.png" alt="아이콘">
                    <div>15°</div>
                </div>
                <div class="forecast-item">
                    <div>7시</div>
                    <img src="weather-icon.png" alt="아이콘">
                    <div>14°</div>
                </div>
                <div class="forecast-item">
                    <div>8시</div>
                    <img src="weather-icon.png" alt="아이콘">
                    <div>14°</div>
                </div>
                <div class="forecast-item">
                    <div>9시</div>
                    <img src="weather-icon.png" alt="아이콘">
                    <div>14°</div>
                </div>
                <div class="forecast-item">
                    <div>10시</div>
                    <img src="weather-icon.png" alt="아이콘">
                    <div>15°</div>
                </div>
                <div class="forecast-item">
                    <div>11시</div>
                    <img src="weather-icon.png" alt="아이콘">
                    <div>15°</div>
                </div>
            </div>
            <div class="forecast-daily">
                <div class="forecast-item">
                    <div>오늘</div>
                    <img src="weather-icon.png" alt="아이콘">
                    <div>13°</div>
                    <div>18°</div>
                </div>
                <div class="forecast-item">
                    <div>토</div>
                    <img src="weather-icon.png" alt="아이콘">
                    <div>12°</div>
                    <div>21°</div>
                </div>
                <div class="forecast-item">
                    <div>일</div>
                    <img src="weather-icon.png" alt="아이콘">
                    <div>14°</div>
                    <div>25°</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
